{% extends 'base.html' %}
{% block content %}
<div class="max-w-6xl mx-auto space-y-8">
    <div class="flex justify-between items-center">
        <h1 class="text-3xl font-black text-blue-900 uppercase italic">🎯 Painel de Alvos</h1>
        <div class="flex gap-4">
            <a href="{% url 'criar_servidor' %}" class="bg-blue-900 text-white px-6 py-3 rounded-xl font-black hover:bg-blue-800 shadow-lg">+ MONITORAR SERVIDOR</a>
            <button onclick="document.getElementById('modalOrgao').classList.remove('hidden')" class="bg-slate-800 text-white px-6 py-3 rounded-xl font-black hover:bg-slate-700 shadow-lg">+ MONITORAR UNIDADE</button>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-slate-50 border-b border-slate-200">
                <tr>
                    <th class="px-6 py-4 text-xs font-black uppercase text-slate-500">Servidor / Alvo</th>
                    <th class="px-6 py-4 text-xs font-black uppercase text-slate-500">ID Funcional</th>
                    <th class="px-6 py-4 text-xs font-black uppercase text-slate-500 text-right">Ação</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
                {% for s in servidores %}
                <tr class="hover:bg-blue-50/50 transition-colors">
                    <td class="px-6 py-4 font-bold text-blue-900">{{ s.nome }} <span class="block text-[10px] text-slate-400 font-normal uppercase italic">{{ s.unidade }}</span></td>
                    <td class="px-6 py-4 font-mono text-sm text-slate-600">{{ s.id_funcional }}</td>
                    <td class="px-6 py-4 text-right"><a href="{% url 'deletar_alvo' 'servidor' s.id %}" class="text-red-500 hover:text-red-700 font-black text-xs uppercase">Remover</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div id="modalOrgao" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full">
            <h3 class="text-2xl font-black text-blue-900 mb-6 uppercase">Monitorar Unidade</h3>
            <form method="POST" action="{% url 'criar_orgao' %}">
                {% csrf_token %}
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Sigla (Ex: DGPC, GAECO)</label>
                <input type="text" name="sigla" required class="w-full px-4 py-3 border border-slate-300 rounded-xl mb-6 focus:ring-2 focus:ring-blue-500 outline-none uppercase font-bold">
                <div class="flex justify-end gap-4">
                    <button type="button" onclick="document.getElementById('modalOrgao').classList.add('hidden')" class="font-bold text-slate-400 text-xs uppercase">Fechar</button>
                    <button type="submit" class="bg-blue-900 text-white px-8 py-3 rounded-xl font-black uppercase text-xs">Salvar Unidade</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
